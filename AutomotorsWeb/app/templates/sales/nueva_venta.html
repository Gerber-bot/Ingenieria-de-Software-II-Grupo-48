{% extends "base.html" %}
{% block title %}Punto de Venta{% endblock %}

{% block content %}
<div class="row g-3">
    <!-- PANEL IZQUIERDO: DATOS Y CARRITO -->
    <div class="col-lg-8">
        <div class="card shadow-sm border-0 mb-3">
            <div class="card-header bg-white py-3"><h5 class="mb-0 text-secondary fw-bold">1. Datos de Venta</h5></div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="fw-bold">Cliente</label>
                        <div class="input-group">
                            <select class="form-select" id="cliente">
                                <option value="">Seleccione...</option>
                                {% for c in clientes %}<option value="{{ c.id_cliente }}">{{ c.apellido }}, {{ c.nombre }} ({{ c.dni }})</option>{% endfor %}
                            </select>
                            <button class="btn btn-outline-success" type="button" title="Nuevo Cliente" data-url="{{ url_for('sales.clientes') }}" onclick="window.open(this.dataset.url, '_blank')">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button class="btn btn-outline-secondary" type="button" title="Recargar Clientes" onclick="window.location.reload()">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold">Vendedor</label>
                        <select class="form-select" id="vendedor">
                            <option value="">Seleccione...</option>
                            {% for v in vendedores %}<option value="{{ v.id_usuario }}" {% if session.user_id == v.id_usuario %}selected{% endif %}>{{ v.apellido }}, {{ v.nombre }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Medio de Pago</label>
<select class="form-select bg-light" id="medio_pago" onchange="toggleFinanciacion()" required>
    <option value="" disabled selected>Seleccione un medio...</option>
    {% for mp in medios_pago %}
    <option value="{{ mp.id_medio_pago }}">{{ mp.nombre }}</option>
    {% endfor %}
</select>
                    </div>
                    <div class="col-md-4">
                        <label class="fw-bold">Fecha</label>
                        <input type="date" class="form-control" id="fecha" value="{{ fecha_actual }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-secondary fw-bold">2. Detalle del Carrito</h5>
            </div>
            <div class="card-body bg-light">
                <div class="row g-2 mb-3">
                    <div class="col-md-5">
                        <select class="form-select" id="selVehiculo">
                            <option value="">Agregar Vehículo...</option>
                            {% for v in vehiculos %}<option value="{{ v.id_vehiculo }}" data-precio="{{ v.precio }}">{{ v.modelo }} - {{ v.patente }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-1"><button class="btn btn-primary w-100" onclick="agregarItem('Vehículo')"><i class="fas fa-plus"></i></button></div>
                    
                    <div class="col-md-5">
                        <select class="form-select" id="selServicio">
                            <option value="">Agregar Servicio...</option>
                            {% for s in servicios %}<option value="{{ s.id_servicio }}" data-precio="{{ s.precio }}">{{ s.nombre }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-1"><button class="btn btn-primary w-100" onclick="agregarItem('Servicio')"><i class="fas fa-plus"></i></button></div>
                </div>

                <table class="table table-bordered bg-white text-center align-middle" id="tablaCarrito">
                    <thead class="table-dark"><tr><th>Tipo</th><th>Descripción</th><th>Cant.</th><th>Precio U.</th><th>Subtotal</th><th></th></tr></thead>
                    <tbody id="bodyCarrito"></tbody>
                </table>
                <h4 class="text-end text-success fw-bold mt-3">TOTAL: $<span id="totalVenta">0.00</span></h4>
            </div>
        </div>
    </div>

    <!-- PANEL DERECHO: FINANCIACIÓN Y CONFIRMACIÓN -->
    <div class="col-lg-4">
        <div class="card shadow-sm border-0 mb-3" id="panelFinanciacion" style="display:none;">
            <div class="card-header bg-white py-3"><h5 class="mb-0 text-secondary fw-bold">3. Calculadora Financiación</h5></div>
            <div class="card-body">
                <label class="fw-bold">Entrega Inicial ($)</label>
                <input type="number" class="form-control mb-2" id="entregaInicial" value="0" onkeyup="calcularFinanciacion()">
                
                <label class="fw-bold">Tasa Interés Anual (%)</label>
                <input type="number" class="form-control mb-2" id="tasaInteres" value="2.5" step="0.1" onkeyup="calcularFinanciacion()">
                
                <label class="fw-bold">Cantidad de Cuotas</label>
                <div class="input-group mb-3">
                    <input type="number" class="form-control" id="cuotas" value="12" min="1" max="120" onchange="calcularFinanciacion()" onkeyup="calcularFinanciacion()">
                    <span class="input-group-text">Cuotas</span>
                </div>

                <div class="p-3 bg-light rounded text-center border">
                    <small class="text-muted d-block">Monto a Financiar</small>
                    <h5 class="text-danger fw-bold">$<span id="montoFinanciado">0.00</span></h5>
                    <small class="text-muted d-block mt-2">Valor Cuota Fija</small>
                    <h4 class="text-primary fw-bold">$<span id="valorCuota">0.00</span></h4>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-danger btn-lg w-25 fw-bold shadow-sm" onclick="limpiarVenta()" title="Cancelar Venta">
                <i class="fas fa-times"></i>
            </button>
            <button class="btn btn-success btn-lg w-75 fw-bold shadow-sm" onclick="confirmarVenta()">
                <i class="fas fa-check-circle me-2"></i>Procesar Venta
            </button>
        </div>
    </div>
</div>

<script>
    let carrito = [];
    let planCuotas = [];
    let totalGeneral = 0;

    function agregarItem(tipo) {
        const select = tipo === 'Vehículo' ? document.getElementById('selVehiculo') : document.getElementById('selServicio');
        if(!select.value) return;

        const id = select.value;
        const desc = select.options[select.selectedIndex].text;
        const precio = parseFloat(select.options[select.selectedIndex].getAttribute('data-precio'));

        if(carrito.find(i => i.id === id && i.tipo === tipo)) {
            alert('El ítem ya está en el carrito');
            return;
        }

        carrito.push({ tipo, id, desc, precio, cantidad: 1, subtotal: precio });
        select.value = '';
        renderCarrito();
    }

    function eliminarItem(index) {
        carrito.splice(index, 1);
        renderCarrito();
    }

    function renderCarrito() {
        const tbody = document.getElementById('bodyCarrito');
        tbody.innerHTML = '';
        totalGeneral = 0;

        carrito.forEach((item, index) => {
            totalGeneral += item.subtotal;
            tbody.innerHTML += `
                <tr>
                    <td><span class="badge ${item.tipo==='Vehículo'?'bg-primary':'bg-info'}">${item.tipo}</span></td>
                    <td>${item.desc}</td>
                    <td>${item.cantidad}</td>
                    <td>$${item.precio.toFixed(2)}</td>
                    <td class="fw-bold">$${item.subtotal.toFixed(2)}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="eliminarItem(${index})"><i class="fas fa-trash"></i></button></td>
                </tr>`;
        });
        document.getElementById('totalVenta').innerText = totalGeneral.toFixed(2);
        calcularFinanciacion();
    }

    function toggleFinanciacion() {
        const select = document.getElementById('medio_pago'); 
        if (!select.value) return;        
        const nombreMedio = select.options[select.selectedIndex].text.toLowerCase();
        document.getElementById('panelFinanciacion').style.display = nombreMedio.includes('financiad') ? 'block' : 'none';
        calcularFinanciacion();
    }

   //calculadora
    function calcularFinanciacion() {
        if(totalGeneral === 0) return;

        const entrega = parseFloat(document.getElementById('entregaInicial').value) || 0;
        const tasaAnual = parseFloat(document.getElementById('tasaInteres').value) || 0;
        const cuotas = parseInt(document.getElementById('cuotas').value) || 12;

        let monto = totalGeneral - entrega;
        if(monto < 0) monto = 0;
        
        document.getElementById('montoFinanciado').innerText = monto.toFixed(2);
        planCuotas = [];

        if(monto === 0 || document.getElementById('panelFinanciacion').style.display === 'none') {
            document.getElementById('valorCuota').innerText = "0.00";
            return;
        }

        let tasaMensual = tasaAnual / 100 / 12;
        let valorCuota = 0;
        let saldo = monto;
        let fecha = new Date(document.getElementById('fecha').value);

        if(tasaMensual === 0) {
            valorCuota = monto / cuotas;
            for(let i=1; i<=cuotas; i++) {
                fecha.setMonth(fecha.getMonth() + 1);
                saldo -= valorCuota;
                planCuotas.push({
                    numero: i, vencimiento: fecha.toISOString().split('T')[0],
                    capital: valorCuota, interes: 0, total: valorCuota, saldo: Math.max(0, saldo)
                });
            }
        } else {
            let factor = Math.pow(1 + tasaMensual, cuotas);
            valorCuota = monto * (tasaMensual * factor) / (factor - 1);
            
            for(let i=1; i<=cuotas; i++) {
                fecha.setMonth(fecha.getMonth() + 1);
                let interes = saldo * tasaMensual;
                let capital = valorCuota - interes;
                if(i === cuotas) { capital = saldo; valorCuota = capital + interes; } // Ajuste última cuota
                saldo -= capital;
                
                planCuotas.push({
                    numero: i, vencimiento: fecha.toISOString().split('T')[0],
                    capital: capital, interes: interes, total: valorCuota, saldo: Math.max(0, saldo)
                });
            }
        }
        document.getElementById('valorCuota').innerText = valorCuota.toFixed(2);
    }

    function limpiarVenta() {
        if(confirm("¿Está seguro de cancelar la operación? Se vaciará el carrito y se perderán los datos cargados.")) {
            window.location.reload();
        }
    }

    function confirmarVenta() {
        if(carrito.length === 0) return alert('El carrito está vacío');
        if(!document.getElementById('cliente').value) return alert('Seleccione un cliente');
        if(!document.getElementById('vendedor').value) return alert('Seleccione un vendedor');
        
        const selectMedio = document.getElementById('medio_pago');
        
        if(!selectMedio.value) return alert('Seleccione un medio de pago');

        const esFinanciado = document.getElementById('panelFinanciacion').style.display !== 'none';

        const payload = {
            id_cliente: document.getElementById('cliente').value,
            id_vendedor: document.getElementById('vendedor').value,
            id_medio_pago: selectMedio.value,
            forma_pago: esFinanciado ? 'Financiado' : 'Contado',
            fecha: document.getElementById('fecha').value,
            total_venta: totalGeneral,
            entrega_inicial: esFinanciado ? parseFloat(document.getElementById('entregaInicial').value) : 0,
            monto_financiado: esFinanciado ? parseFloat(document.getElementById('montoFinanciado').innerText) : 0,
            cuotas: esFinanciado ? parseInt(document.getElementById('cuotas').value) : 0,
            valor_cuota: esFinanciado ? parseFloat(document.getElementById('valorCuota').innerText) : 0,
            tasa_interes: esFinanciado ? parseFloat(document.getElementById('tasaInteres').value) : 0,
            detalles: carrito,
            plan_cuotas: planCuotas
        };

        fetch("{{ url_for('sales.nueva_venta') }}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert(data.message);
                // Redirige al historial de ventas al terminar
                window.location.href = "{{ url_for('sales.historial_ventas') }}"; 
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error al comunicarse con el servidor.");
        });
    }
</script>
{% endblock %}
